<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container my-5 text-center" style="max-width: 550px;">

    <div class="card shadow border-success p-4">
        <div class="text-success display-4 mb-2">✓</div>
        <h2 class="text-success mb-2">Payment Successful!</h2>
        <p class="lead mb-3">Thank you, <strong>{{ customer_name }}</strong>.</p>
        
        <div class="alert alert-success py-2 text-center small mb-4">
            Successfully reserved <strong>{{ quantity_bought }}</strong> entry pass(es) for <strong>{{ event.title }}</strong>.
        </div>
        
        <!-- --- INTERACTIVE QR CODE PRESENTATION LAYER --- -->
        <div class="bg-light p-3 rounded border mb-4">
            <h6 class="text-secondary uppercase tracking-wider mb-2 small">Your Digital Check-In Pass</h6>
            
            <!-- Added a cross-origin attribute for absolute browser safety -->
            <img src="{{ qr_data_url }}" id="ticketQrImage" alt="Digital Entry Pass Ticket" class="img-fluid border rounded shadow-sm bg-white p-2" style="max-width: 220px;" crossorigin="anonymous">
            
            <div class="mt-3">
                <!-- Force explicit system down-conversion using safe clean naming strings -->
                <a href="{{ qr_data_url }}" 
                download="{{ safe_filename }}.png" 
                class="btn btn-outline-success btn-sm px-4 fw-bold"
                onclick="downloadQR(event, this)">
                    📥 Download QR Code Pass
                </a>
            </div>
        </div>
        
        <p class="mb-1 text-muted small">Confirmation details dispatched to:</p>
        <p class="fw-bold text-dark mb-4">{{ customer_email }}</p>
        
        <div class="d-grid border-top pt-3">
            <a href="{% url 'home' %}" class="btn btn-primary">Return to Main Dashboard</a>
        </div>
    </div>
<script>
function downloadQR(e, anchor) {
    // Fallback handler for older operating systems or strict browser viewports
    if (window.navigator.msSaveOrOpenBlob) {
        e.preventDefault();
        var byteString = atob(anchor.href.split(',')[1]);
        var ab = new ArrayBuffer(byteString.length);
        var ia = new Uint8Array(ab);
        for (var i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        var blob = new Blob([ab], {type: "image/png"});
        window.navigator.msSaveOrOpenBlob(blob, anchor.download);
    }
}
</script>
</body>
</html>
