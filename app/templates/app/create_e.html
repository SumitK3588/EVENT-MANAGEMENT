<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Event</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container my-5" style="max-width: 600px;">

    <h1 class="mb-4">Create an Event</h1>
    
    <form method="POST" class="shadow p-4 rounded bg-light">
        {% csrf_token %} <!-- Crucial security token for Django forms -->
        
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label font-weight-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Publish Event</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

</body>
</html>
