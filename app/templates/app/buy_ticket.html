<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout - {{ event.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container my-5" style="max-width: 700px;">

    <div class="card shadow p-4 border-0 bg-light">
        <h2 class="mb-1 text-dark">Ticket Checkout</h2>
        <p class="text-muted mb-4">Event: <strong class="text-primary">{{ event.title }}</strong></p>
        
        <form method="POST">
            {% csrf_token %}
            
            <h5 class="text-secondary border-bottom pb-2 mb-3">1. Personal Information</h5>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                {{ form.full_name }}
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                {{ form.email }}
            </div>
            <div class="mb-3 bg-white p-3 rounded border">
                <label class="form-label fw-bold text-dark">Select Ticket Quantity</label>
                {{ form.ticket_quantity }}
                <div class="form-text">Maximum of 5 passes per booking transaction.</div>
            </div>
            <h5 class="text-secondary border-bottom pb-2 mb-3 mt-4">2. Payment details</h5>
            <div class="mb-3">
                <label class="form-label">Card Number</label>
                {{ form.card_number }}
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Expiration Date</label>
                    {{ form.expiry_date }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">CVV Security Code</label>
                    {{ form.cvv }}
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success btn-lg">Purchase Ticket Securely</button>
                <a href="{% url 'home' %}" class="btn btn-link text-secondary text-center">Back to Events Dashboard</a>
            </div>
        </form>
    </div>

</body>
</html>
