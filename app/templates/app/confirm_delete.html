<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container my-5 text-center" style="max-width: 500px;">

    <div class="card border-danger shadow p-4">
        <h2 class="text-danger mb-3">Delete Event?</h2>
        <p>Are you sure you want to delete <strong>"{{ event.title }}"</strong>? This action will permanently remove all related event data from the platform.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                <a href="{% url 'home' %}" class="btn btn-secondary">Cancel and Go Back</a>
            </div>
        </form>
    </div>

</body>
</html>
